<!DOCTYPE html>
<html lang="fr">
<head>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#00a859">


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saisie Facture SODECI</title>
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; padding: 10px; color: #333; }
        h2 { color: #00a859; border-bottom: 2px solid #00a859; padding-bottom: 5px; font-size: 1.3em; }
        .section { margin-bottom: 15px; padding-top: 10px; }
        .section-separator { border-top: 2px solid #00a859; }
        h3 { font-size: 1em; margin-bottom: 8px; color: #444; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { display: flex; flex-direction: column; font-size: 0.8em; font-weight: bold; }
        input { padding: 6px; margin-top: 3px; border: 1px solid #ccc; border-radius: 4px; width: 100%; box-sizing: border-box; }
        .btn-group { display: flex; gap: 5px; margin-top: 15px; }
        button { padding: 8px 12px; cursor: pointer; border: none; border-radius: 4px; color: white; background-color: #00a859; font-size: 0.8em; }
        .btn-danger { background-color: #d9534f; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; font-size: 0.75em; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: left; }
        th { background-color: #f8f8f8; }
        #totalGlobal { color: #d9534f; font-weight: bold; margin-left: 10px; }
    </style>
</head>
<body>

    <h2>Saisie des Informations Facturation SODECI</h2>

    <form id="factureForm">
        <div class="section">
            <h3>Informations Client</h3>
            <div class="grid">
                <label>Nom et Prénoms: <input type="text" id="nom_client" name="nom_client"></label>
                <label>Téléphone: <input type="text" id="tel_client" name="tel_client"></label>
                <label>Adresse: <input type="text" id="adresse_client" name="adresse_client"></label>
                <label>N° du compte: <input type="text" id="n_compte" name="n_compte"></label>
            </div>
        </div>

        <div class="section section-separator">
            <h3>Références</h3>
            <div class="grid">
                <label>Centre: <input type="text" id="centre" name="centre"></label>
                <label>Police: <input type="text" id="police" name="police"></label>
                <label>Ordre: <input type="text" id="ordre" name="ordre"></label>
                <label>Clé: <input type="text" id="cle" name="cle"></label>
                <label>Code secteur: <input type="text" id="code_secteur" name="code"></label>
                <label>Code Regroupement: <input type="text" id="code_regroupement" name="code_regroupement"></label>
            </div>
        </div>

        <div class="section section-separator">
            <h3>Consommation</h3>
            <div class="grid">
                <label>Période: <input type="text" id="periode" name="periode"></label>
                <label>Date limite: <input type="text" id="date_limite" name="date_limite"></label>
                <label>Ancien index: <input type="number" id="ancien" name="ancien"></label>
                <label>Nouveau index: <input type="number" id="nouveau" name="nouveau"></label>
                <label>Prix m3: <input type="number" id="prix" name="prix"></label>
            </div>
        </div>

        <div class="btn-group">
            <button type="button" onclick="sauvegarder()">Ajouter ce client</button>
            <button type="button" onclick="window.location.href='accueil.html'">Voir les factures</button>
            <button type="button" class="btn-danger" onclick="effacerTout()">Effacer tout</button>
        </div>
    </form>

    <div class="section">
        <h3>Liste des clients enregistrés <span id="totalGlobal"></span></h3>
        <table id="listeClients">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Nom & Prénoms</th>
                    <th>N° Compteur</th>
                    <th>N° Tél</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tbodyClients"></tbody>
        </table>
    </div>

<script>
    async function afficherListe() {
        const tbody = document.getElementById('tbodyClients');
        const totalSpan = document.getElementById('totalGlobal');
        
        try {
            const response = await fetch('/api/factures');
            const liste = await response.json();
            
            tbody.innerHTML = "";
            let sommeTotale = 0;
            
            // L'index + 1 sert ici d'incrémentation visuelle (numérotation)
            liste.forEach((client, index) => {
                let row = `<tr>
                    <td>${index + 1}</td>
                    <td>${client.nom_client}</td>
                    <td>${client.n_compte}</td>
                    <td>${client.tel_client}</td>
                    <td><a href="modif.html?id=${client.id}">Modifier</a></td>
                </tr>`;
                tbody.innerHTML += row;
                
                let cubage = (parseFloat(client.nouveau) || 0) - (parseFloat(client.ancien) || 0);
                sommeTotale += cubage * (parseFloat(client.prix) || 0);
            });
            
            totalSpan.innerText = "Total : " + sommeTotale.toLocaleString() + " FCFA";
        } catch (err) { 
            console.error("Erreur chargement :", err); 
        }
    }

    async function sauvegarder() {
        const donnees = {
            nom_client: document.getElementById('nom_client').value,
            tel_client: document.getElementById('tel_client').value,
            adresse_client: document.getElementById('adresse_client').value,
            n_compte: document.getElementById('n_compte').value,
            centre: document.getElementById('centre').value,
            police: document.getElementById('police').value,
            ordre: document.getElementById('ordre').value,
            cle: document.getElementById('cle').value,
            code: document.getElementById('code_secteur').value,
            code_regroupement: document.getElementById('code_regroupement').value,
            periode: document.getElementById('periode').value,
            date_limite: document.getElementById('date_limite').value,
            ancien: document.getElementById('ancien').value,
            nouveau: document.getElementById('nouveau').value,
            prix: document.getElementById('prix').value
        };

        try {
            const response = await fetch('/api/factures', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(donnees)
            });
            if (response.ok) {
                document.getElementById('factureForm').reset();
                afficherListe();
            } else { alert("Erreur d'enregistrement."); }
        } catch (err) { console.error("Erreur:", err); }
    }

    async function effacerTout() {
        if(confirm("Voulez-vous vraiment vider la base ?")) {
            try {
                const response = await fetch('/api/factures', { method: 'DELETE' });
                if (response.ok) { afficherListe(); }
            } catch (err) { console.error("Erreur :", err); }
        }
    }

    // Chargement automatique au démarrage
    window.onload = afficherListe;


    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('Service Worker enregistré avec succès !', reg.scope))
                .catch(err => console.log('Échec de l enregistrement du Service Worker :', err));
        });
    }


</script>

</body>
</html>
